syntax = "proto3";

package osac.private.v1;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "osac/private/v1/condition_status_type.proto";
import "osac/private/v1/metadata_type.proto";

// Contains the details about the cluster that are available only for the system.
message Cluster {
  // Public data.
  string id = 1;
  Metadata metadata = 2;
  ClusterSpec spec = 3;
  ClusterStatus status = 4;
}

message ClusterSpec {
  // Copies of the public fields.
  string template = 1;
  map<string, google.protobuf.Any> template_parameters = 2;
  map<string, ClusterNodeSet> node_sets = 3;
  optional string pull_secret = 4;
  optional string ssh_public_key = 5;
  optional string release_image = 6;
  optional ClusterNetwork network = 7;

  // Reference to a cluster catalog item. Mutually exclusive with template during the migration period.
  // When set, the server fetches the catalog item and applies its field definitions.
  string catalog_item = 8;

  // Network attachment connecting this cluster to a tenant subnet.
  //
  // When provided, all node sets of the cluster will be connected to the specified subnet. Only one network attachment
  // is supported per cluster.
  //
  // When not provided, the system will populate this field with the tenant's default subnet and security groups during
  // cluster creation.
  //
  // The `subnet` field is immutable after creation. The `security_groups` field can be updated.
  ClusterNetworkAttachment network_attachment = 9;
}

// Networking configuration for a cluster.
message ClusterNetwork {
  optional string pod_cidr = 1;
  optional string service_cidr = 2;
}

message ClusterStatus {
  // Copies of the public fields.
  ClusterState state = 1;
  repeated ClusterCondition conditions = 2;
  string api_url = 3;
  string console_url = 4;
  map<string, ClusterNodeSet> node_sets = 5;

  // Identifier of the hub that was selected for this cluster.
  string hub = 6;
}

enum ClusterState {
  CLUSTER_STATE_UNSPECIFIED = 0;
  CLUSTER_STATE_PROGRESSING = 1;
  CLUSTER_STATE_READY = 2;
  CLUSTER_STATE_FAILED = 3;
}

message ClusterCondition {
  ClusterConditionType type = 1;
  ConditionStatus status = 2;
  google.protobuf.Timestamp last_transition_time = 3;
  optional string reason = 4;
  optional string message = 5;
}

enum ClusterConditionType {
  CLUSTER_CONDITION_TYPE_UNSPECIFIED = 0;
  CLUSTER_CONDITION_TYPE_PROGRESSING = 1;
  CLUSTER_CONDITION_TYPE_READY = 2;
  CLUSTER_CONDITION_TYPE_FAILED = 3;
  CLUSTER_CONDITION_TYPE_DEGRADED = 4;
}

// Defines the network attachment for a cluster, connecting it to a tenant subnet with optional security groups.
//
// Unlike compute instances, which support multiple network attachments (one per virtual NIC), a cluster has a single
// network attachment shared by all node sets. The fabric interface for each node set is resolved automatically by the
// system from the node set's host type.
message ClusterNetworkAttachment {
  // Identifier of the subnet to connect the cluster to.
  //
  // Must be the value of the `id` field of an existing subnet. The subnet must be in `READY` state at creation time.
  //
  // This can't be modified after the cluster is created.
  string subnet = 1;

  // Identifiers of the security groups to apply to the cluster's network attachment.
  //
  // Each value must be the `id` field of an existing security group. All security groups must belong to the same
  // virtual network as the subnet.
  repeated string security_groups = 2;
}

message ClusterNodeSet {
  string host_type = 1;
  int32 size = 2;
}

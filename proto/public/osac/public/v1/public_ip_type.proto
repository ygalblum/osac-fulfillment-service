syntax = "proto3";

package osac.public.v1;

import "google/api/field_behavior.proto";
import "osac/public/v1/ip_family_type.proto";
import "osac/public/v1/metadata_type.proto";

// Represents a public IP address allocated from a PublicIPPool.
//
// A PublicIP is a floating public IP address allocated from a parent PublicIPPool's CIDR ranges.
// The pool can be specified directly or auto-selected based on IP family preference.
// The pool assignment is immutable after creation.
//
// Attachment to a target resource (e.g., ComputeInstance) is managed by a separate
// PublicIPAttachment resource. The status.attached boolean indicates whether a
// PublicIPAttachment currently exists for this PublicIP.
//
// The lifecycle follows: PENDING (awaiting allocation) -> ALLOCATED (IP assigned).
// FAILED is a terminal error state for provisioning failures.
message PublicIP {
  // Unique identifier of the public IP.
  string id = 1;

  // Metadata of the public IP, including name, labels, and timestamps.
  Metadata metadata = 2;

  // Desired configuration of the public IP (user-specified).
  PublicIPSpec spec = 3;

  // Current state of the public IP (system-provided, read-only).
  PublicIPStatus status = 4;
}

// Defines the desired configuration for a PublicIP.
//
// At most one of pool or ip_family may be provided on creation. If neither is specified, the
// system defaults to IPv4. Both fields are immutable after creation.
message PublicIPSpec {
  // Parent PublicIPPool ID. Mutually exclusive with ip_family.
  //
  // When provided, must reference the ID of an existing PublicIPPool in READY state. The system
  // allocates an available IP address from this pool's CIDR ranges during provisioning.
  // When ip_family is provided instead, the system auto-selects a pool and populates this field.
  // Immutable after creation.
  //
  // Example: "pool-abc123"
  string pool = 1 [
    (google.api.field_behavior) = IMMUTABLE
  ];

  // Desired IP address family. Mutually exclusive with pool. Immutable after creation.
  //
  // When set, the system selects a READY pool matching this family with the most available
  // capacity. If neither pool nor ip_family is specified, defaults to IPv4.
  IPFamily ip_family = 2 [
    (google.api.field_behavior) = IMMUTABLE
  ];
}

// Represents the current operational state of a PublicIP.
//
// Status is system-provided and read-only. Users cannot modify status fields directly; the system
// updates them based on reconciliation of the spec and feedback from the cluster controller.
message PublicIPStatus {
  // Current lifecycle state of the public IP.
  PublicIPState state = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Human-readable message providing additional details about the current state.
  //
  // For PENDING state, may contain progress information like "Waiting for IP allocation".
  // Typically empty for ALLOCATED state.
  optional string message = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Allocated IP address from the parent pool's CIDR range.
  //
  // Populated once the IP transitions to ALLOCATED state. Remains stable for the lifetime of
  // the PublicIP. Cleared only when the IP is deallocated.
  string address = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Parent PublicIPPool ID that this IP was allocated from.
  //
  // Mirrors spec.pool for convenience in status queries. Populated when the IP is allocated.
  string pool = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Whether this PublicIP is currently attached to a target resource via a PublicIPAttachment.
  //
  // Set to true when a PublicIPAttachment referencing this PublicIP reaches READY state.
  // Set to false when the PublicIPAttachment is deleted. A PublicIP with attached = true
  // cannot be deleted; the PublicIPAttachment must be deleted first.
  bool attached = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Lifecycle states for PublicIP resources.
//
// State transitions: UNSPECIFIED -> PENDING -> ALLOCATED.
// FAILED is a terminal error state for provisioning failures.
enum PublicIPState {
  // State is unknown or has not been determined yet. Default state before initialization.
  PUBLIC_IP_STATE_UNSPECIFIED = 0;

  // The public IP is being provisioned and an address has not been assigned yet.
  //
  // During this state, the system is creating the MetalLB LoadBalancer Service on the target
  // cluster and waiting for an IP address to be allocated from the parent pool's CIDR range.
  PUBLIC_IP_STATE_PENDING = 1;

  // The public IP has been assigned an address.
  //
  // The address is allocated and reserved. The IP can be attached to a target resource by
  // creating a PublicIPAttachment. The status.attached boolean indicates whether an
  // attachment currently exists.
  PUBLIC_IP_STATE_ALLOCATED = 2;

  // Provisioning failed. Check status.message for error details.
  //
  // This is a terminal error state. The PublicIP may require deletion and recreation,
  // or an administrator can retry via the private API Signal RPC.
  PUBLIC_IP_STATE_FAILED = 3;

  // The public IP is being deprovisioned and will be removed.
  //
  // On deletion of a PublicIP, the system removes the MetalLB LoadBalancer Service and
  // returns the address to the pool. A PublicIP cannot be deleted while attached
  // (status.attached = true). The resource remains visible in this state until fully
  // cleaned up.
  PUBLIC_IP_STATE_DELETING = 4;
}

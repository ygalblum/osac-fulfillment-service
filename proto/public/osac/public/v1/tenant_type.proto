syntax = "proto3";

package osac.public.v1;

import "osac/public/v1/metadata_type.proto";

// A tenant groups resources and users for a customer or business unit.
//
// buf:lint:ignore OSAC_OBJECT_SHAPE
message Tenant {
  // Unique identifier of the tenant.
  string id = 1;

  Metadata metadata = 2;

  TenantSpec spec = 3;
}

message TenantSpec {
  // List of e-mail domains associated with this tenant.
  //
  // These are used to automatically redirect users to the correct identity provider during login. Each domain must be a
  // valid DNS hostname with only lowercase labels, for example `example.com` or `corp.example.org`. Uppercase letters
  // are rejected. Domains must be globally unique across all tenants.
  repeated string domains = 1;
}

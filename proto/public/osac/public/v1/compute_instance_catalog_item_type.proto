syntax = "proto3";

package osac.public.v1;

import "osac/public/v1/field_definition_type.proto";
import "osac/public/v1/metadata_type.proto";

// A compute instance catalog item defines a curated infrastructure offering that references an underlying compute
// instance template.
//
// buf:lint:ignore OSAC_OBJECT_SHAPE
message ComputeInstanceCatalogItem {
  // Unique identifier of the catalog item.
  string id = 1;

  Metadata metadata = 2;

  // Human friendly short description of the catalog item, suitable for displaying in one single line on a UI or CLI.
  string title = 3;

  // Human friendly long description of the catalog item, using Markdown format.
  string description = 4;

  // Identifier of the underlying compute instance template that this catalog item references.
  string template = 5;

  // Whether this catalog item is published.
  bool published = 6;

  // Field 7 is omitted: `tenant` is an internal field managed by the server, not exposed through the public API.

  // Definitions of the fields that users can or cannot set when creating a resource from this catalog item.
  repeated FieldDefinition field_definitions = 8;
}

domains:

columns:

- header: PROJECT
  value: "has(this.metadata.project)? this.metadata.project: '-'"

- header: ID
  value: this.id

- header: NAME
  value: "has(this.metadata.name)? this.metadata.name: '-'"

- header: TEMPLATE
  value: this.spec.template
  type: osac.public.v1.ComputeInstanceTemplate
  lookup: true

- header: OS
  value: "has(this.spec.is_windows) && this.spec.is_windows ? 'windows' : 'linux'"

- header: STATE
  value: this.status.state
  type: osac.public.v1.ComputeInstanceState

- header: INTERNAL IP ADDRESS
  value: this.status.internal_ip_address

- header: EXTERNAL IP ADDRESS
  value: this.status.external_ip_address

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
- includeSelectors: true
  pairs:
    app: fulfillment-service

resources:
- namespace.yaml
- database
- grpc-server
- console-proxy
- ingress-proxy
- rest-gateway
- admin
- controller

images:
- name: envoy
  newName: docker.io/envoyproxy/envoy
  newTag: v1.37.1
- name: fulfillment-service
  newName: ghcr.io/osac-project/fulfillment-service
  newTag: main
- name: postgres
  newName: quay.io/sclorg/postgresql-18-c10s
  digest: sha256:6be2c9d855f06fb665257a6b0911676a38d740be7022cc61acee1c99a832b1b2
